spring:
  application:
    name: udp-ingest-service
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

f1:
  telemetry:
    udp:
      enabled: true
      host: 0.0.0.0
      port: 20777
    kafka:
      enabled: true
      retry:
        enabled: true
        max-attempts: 3
        initial-backoff-ms: 100
      throttle:
        enabled: true
        # Higher rate reduces lag; F1 can send 20–60 packets/s per packet type across multiple types.
        permits-per-second: 250

logging:
  level:
    com.ua.yushchenko.f1.fastlaps: DEBUG
