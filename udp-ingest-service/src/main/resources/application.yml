spring:
  application:
    name: udp-ingest-service
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

f1:
  telemetry:
    udp:
      enabled: true
      host: 0.0.0.0
      port: 20777
    packet-health:
      # How often to publish packet loss ratio to Kafka (ms). Processing uses it for diagnostics API.
      publish-interval-ms: 5000
    kafka:
      enabled: true
      retry:
        enabled: true
        max-attempts: 3
        initial-backoff-ms: 100
      throttle:
        enabled: true
        # Must allow ~22*60 = 1320 msg/s for motion alone (1 packet = 22 cars). Higher = less UI lag.
        permits-per-second: 2000

logging:
  level:
    com.ua.yushchenko.f1.fastlaps: DEBUG
