spring:
  application:
    name: telemetry-processing-api-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/telemetry}
    username: ${SPRING_DATASOURCE_USERNAME:telemetry}
    password: ${SPRING_DATASOURCE_PASSWORD:telemetry}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: telemetry-processing-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer

server:
  port: 8081

logging:
  level:
    org.springframework.kafka: INFO
    com.ua.yushchenko.f1.fastlaps.telemetry.processing.consumer: INFO  # "Received ..." when messages are consumed
  # For more verbose debugging use profile 'dev': spring.profiles.active=dev (see application-dev.yml)

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
