spring:
  application:
    name: telemetry-processing-api-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/telemetry}
    username: ${SPRING_DATASOURCE_USERNAME:telemetry}
    password: ${SPRING_DATASOURCE_PASSWORD:telemetry}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: telemetry-processing-group
      auto-offset-reset: earliest
      # Smaller batches = more frequent commits, less delay before new positions reach live UI.
      # If live map still lags, increase UDP ingest throttle (udp-ingest f1.telemetry.kafka.throttle.permits-per-second).
      max-poll-records: ${SPRING_KAFKA_CONSUMER_MAX_POLL_RECORDS:100}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer

server:
  port: 8081

logging:
  level:
    org.springframework.kafka: INFO
    com.ua.yushchenko.f1.fastlaps.telemetry.processing.consumer: INFO  # "Received ..." when messages are consumed
  # For more verbose debugging use profile 'dev': spring.profiles.active=dev (see application-dev.yml)
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{traceId:-}] [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

telemetry:
  idempotency:
    processed-packets:
      # Rows older than this duration are removed by the scheduled purge (see ProcessedPacketRetentionScheduler).
      # Short values weaken Kafka idempotency if old messages are redelivered; increase in production.
      retention: PT2M
      # Milliseconds between purge runs (@Scheduled fixedDelay).
      purge-interval-ms: 120000

packet-health:
  threshold:
    # GOOD: almost no packet loss (<5%) — live UI should feel solid.
    good-min-percent: 95
    # OK: moderate packet loss (5–20%); below this value is treated as POOR.
    ok-min-percent: 80
  store:
    # Max age (ms) for cached ratio; after this, value is treated as stale and not returned.
    max-age-ms: 120000
