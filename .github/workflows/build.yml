name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        id: build
        run: mvn clean install -B -q -Djacoco.haltOnFailure=false

      - name: Integration tests (track layout recording, Testcontainers)
        run: mvn -pl telemetry-processing-api-service test -Dtest=TrackLayoutRecordingFromLogSequenceIntegrationTest -B -q

      - name: Upload JaCoCo report (telemetry-processing-api-service)
        uses: actions/upload-artifact@v4
        if: steps.build.outcome == 'success'
        with:
          name: jacoco-report
          path: telemetry-processing-api-service/target/site/jacoco/
          retention-days: 7

      - name: Set up Node.js 20 for frontend
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: f1-telemetry-web-platform
        run: npm ci

      - name: Build frontend
        working-directory: f1-telemetry-web-platform
        run: npm run build
