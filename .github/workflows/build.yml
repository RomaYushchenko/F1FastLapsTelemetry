name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        id: build
        run: mvn clean install -B -q -Djacoco.haltOnFailure=false

      - name: Upload JaCoCo report (telemetry-processing-api-service)
        uses: actions/upload-artifact@v4
        if: steps.build.outcome == 'success'
        with:
          name: jacoco-report
          path: telemetry-processing-api-service/target/site/jacoco/
          retention-days: 7

      - name: Set up Node.js 20 for UI
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install UI dependencies
        working-directory: ui
        run: |
          rm -rf node_modules
          npm install
      - name: Install Rollup Linux binary (npm optional deps workaround)
        working-directory: ui
        run: npm install @rollup/rollup-linux-x64-gnu --no-save

      - name: Lint UI
        working-directory: ui
        run: npm run lint

      - name: Build UI
        working-directory: ui
        run: npm run build
